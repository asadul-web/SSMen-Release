name: Upload APK to Cloudflare R2

on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for APK asset and download
        run: |
          echo "Checking for APK asset..."

          for i in {1..12}
          do
            URL=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')

            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "APK found: $URL"
              curl -L "$URL" -o FIGHTER-V2RAY.apk
              break
            fi

            echo "APK not ready yet. Waiting 10 seconds..."
            sleep 10
          done

          if [ ! -f FIGHTER-V2RAY.apk ]; then
            echo "APK was not found after waiting."
            exit 1
          fi

      - name: Upload to Cloudflare R2
  env:
    AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
    AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  run: |
    VERSION=${{ github.event.release.tag_name }}

    aws s3 cp FIGHTER-V2RAY.apk \
      s3://${{ secrets.R2_BUCKET_NAME }}/FIGHTER-V2RAY-${VERSION}.apk \
      --endpoint-url=${{ secrets.R2_ENDPOINT }} \
      --region auto
