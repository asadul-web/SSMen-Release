<!DOCTYPE html>
<html>
<head>
    <title>FIGHTER V2RAY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

        body {
            height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .card {
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:60px 40px;
            text-align:center;
            width:350px;
            box-shadow:0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            width:120px;
            margin-bottom:20px;
            filter:drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        h1 {
            font-size:32px;
            margin-bottom:10px;
        }

        .tagline {
            color:#94a3b8;
            font-size:14px;
            margin-bottom:15px;
        }

        .version {
            font-size:13px;
            color:#cbd5e1;
            margin-bottom:25px;
        }

        .download-btn {
            display:inline-block;
            padding:14px 35px;
            background:linear-gradient(90deg,#3b82f6,#2563eb);
            color:white;
            text-decoration:none;
            font-size:16px;
            border-radius:10px;
            transition:0.3s;
            box-shadow:0 10px 25px rgba(37,99,235,0.4);
        }

        .download-btn:hover {
            transform:translateY(-3px);
            box-shadow:0 15px 35px rgba(37,99,235,0.6);
        }

        .footer {
            margin-top:25px;
            font-size:12px;
            color:#64748b;
        }
    </style>
</head>

<body>

<div class="card">

    <img src="logo.png" class="logo" alt="FIGHTER Logo">

    <h1>FIGHTER V2RAY</h1>
    <div class="tagline">Your Internet. Your Rules</div>

    <div class="version" id="version">
        Loading latest version...
    </div>

    <a class="download-btn"
       href="https://github.com/asadul-web/SSMen-Release/releases/latest/download/SSMen.apk">
        Download APK
    </a>

    <div class="footer">
        Android 5.0+ • Secure Release
    </div>

</div>

<script>
fetch("https://api.github.com/repos/asadul-web/SSMen-Release/releases/latest")
.then(response => response.json())
.then(data => {
    document.getElementById("version").innerText =
        "Latest Version: " + data.tag_name;
})
.catch(() => {
    document.getElementById("version").innerText =
        "Latest Version Available";
});
</script>

</body>
</html>
